name: CI-CD - Staging

on:
  workflow_dispatch:
  push:
    branches:    
      - staging
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
env:
  REGISTRY: containerregistryhs2023.azurecr.io
  IMAGE_NAME: flujoshs-api
  
jobs:
  build:
    name: Build container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-{{sha}}
      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          
  update:
    name: Update Helm Manifests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Update Image Tag Values
      run: |
        chart_dir=".chart"
        new_image_tag=${{ github.sha }}
        short_sha=sha-${new_image_tag:0:7}

        # Update the values.yaml file with the new image tag
        sed -i "s/^  tag: .*/  tag: $short_sha/" "$chart_dir/values.yaml"        
    
    - name: Commit the changes made
      run: | 
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git commit -am "cd: updating image tag in argo"
        git push